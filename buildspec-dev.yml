version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: ap-northeast-2
    IMAGE_REPO_NAME: mapsea-notification-consumer
    CONTAINER_NAME: mapsea-notification-consumer

cache:
  paths:
    - '/root/.gradle/caches/**/*'
    - '/root/.gradle/wrapper/**/*'

phases:
  install:
    commands:
      - echo Installing Trivy for security scanning...
      - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

  pre_build:
    commands:
      - set -e
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - REPOSITORY_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:=latest}
      - BRANCH_NAME=${CODEBUILD_WEBHOOK_HEAD_REF:-unknown}
      - echo "Building commit $COMMIT_HASH from $BRANCH_NAME"

  build:
    commands:
      - echo Build started on `date`
      - echo Building the Docker image...
      - docker build --cache-from $REPOSITORY_URI:latest -t $REPOSITORY_URI:latest -t $REPOSITORY_URI:$IMAGE_TAG .

  post_build:
    commands:
      - echo Build completed on `date`
      - echo Running security scan...
      - trivy image --exit-code 0 --severity HIGH,CRITICAL --no-progress $REPOSITORY_URI:$IMAGE_TAG || true
      - echo Pushing the Docker images...
      - docker push $REPOSITORY_URI:latest
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - echo Generating CodeDeploy artifacts...
      - sed "s/\${AWS_ACCOUNT_ID}/$AWS_ACCOUNT_ID/g" taskdef-dev.json > taskdef.json
      - cp appspec-dev.yaml appspec.yaml
      - printf '{"ImageURI":"%s"}' $REPOSITORY_URI:$IMAGE_TAG > imageDetail.json
      - echo "=== taskdef.json ===" && cat taskdef.json
      - echo "=== appspec.yaml ===" && cat appspec.yaml
      - echo "=== imageDetail.json ===" && cat imageDetail.json

artifacts:
  files:
    - taskdef.json
    - appspec.yaml
    - imageDetail.json
